# After slide: Challenges of Prompt Engineering
- question: "What is true for prompt engineering? (Select all that apply)"
  type: multiple
  answers:
    - "The same prompt may produce different results on different models"
    - "Small wording changes can significantly affect model outputs"
    - "Systematic evaluation of prompt quality is straightforward"
    - "Prompt engineering can inject new factual knowledge into a model"
    - "Prompts that work well today may fail after a model update"
    - "The effect of a prompt change is often hard to predict in advance"
  correct:
    - A
    - B
    - E
    - F
  explanation: "C wrong: evaluation is hard. D wrong: prompts elicit existing knowledge, they don't add new facts."
